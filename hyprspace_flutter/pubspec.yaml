name: hyprspace_flutter
description: A cross-platform VPN application powered by libp2p peer-to-peer networking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^5.0.2

  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Security
  flutter_secure_storage: ^9.0.0
  cryptography: ^2.7.0
  pointycastle: ^3.7.4

  # FFI
  ffi: ^2.1.2

  # Logging
  logger: ^2.0.2+1

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.5

  # Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Routing
  go_router: ^13.2.0

  # UI
  flutter_svg: ^2.0.10+1
  animations: ^2.0.11

  # Utils
  package_info_plus: ^5.0.1
  device_info_plus: ^10.1.0

dev_dependencies:
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  drift_dev: ^2.16.0
  injectable_generator: ^2.4.2
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
