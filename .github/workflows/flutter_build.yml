name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'hyprspace_flutter/**'
      - '.github/workflows/flutter_build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hyprspace_flutter/**'
      - '.github/workflows/flutter_build.yml'

# Minimal default permissions for all jobs
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Unit & widget tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: hyprspace_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: hyprspace_flutter/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Linux desktop build
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: hyprspace_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev \
            golang-go

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Add Linux desktop support
        run: flutter create --platforms=linux .

      - name: Build Linux release
        run: flutter build linux --release

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyprspace-linux
          path: hyprspace_flutter/build/linux/x64/release/bundle/

  # ---------------------------------------------------------------------------
  # Windows desktop build
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: hyprspace_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Add Windows desktop support
        run: flutter create --platforms=windows .

      - name: Add MinGW to PATH (for CGO)
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Go native DLL
        shell: bash
        run: |
          (cd native/go && CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -buildmode=c-shared \
              -ldflags="-extldflags=-static-libgcc" \
              -o hyprspace.dll .)

      - name: Build Windows release
        run: flutter build windows --release

      - name: Copy hyprspace.dll to release output
        shell: pwsh
        run: |
          Copy-Item "native\go\hyprspace.dll" -Destination "build\windows\x64\runner\Release\"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyprspace-windows
          path: hyprspace_flutter/build/windows/x64/runner/Release/

  # ---------------------------------------------------------------------------
  # Android build
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: hyprspace_flutter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK Platform 35
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Add Android support
        run: flutter create --platforms=android .

      - name: Set compileSdkVersion to 35
        run: |
          sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/' android/app/build.gradle
          grep -E 'compileSdk(Version)?\s+35' android/app/build.gradle || \
            { echo "ERROR: Failed to set compileSdkVersion to 35 in build.gradle"; exit 1; }

      - name: Build Android APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyprspace-android-apks
          path: hyprspace_flutter/build/app/outputs/flutter-apk/*.apk
